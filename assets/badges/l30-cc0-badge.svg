<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180" role="img" aria-label="CC0 Public Domain Non-binding reference badge">
  <defs>
    <linearGradient id="badgeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b6fb7"/>
      <stop offset="0.55" stop-color="#07508d"/>
      <stop offset="1" stop-color="#032b52"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#001629" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="10" y="10" width="500" height="160" rx="28" fill="url(#badgeBlue)"/>
    <rect x="20" y="20" width="480" height="140" rx="20" fill="none" stroke="#ffffff" stroke-width="7"/>
    <rect x="42" y="46" width="134" height="88" rx="18" fill="#003964" fill-opacity="0.58" stroke="#ffffff" stroke-width="4"/>

    <text x="109" y="106"
          text-anchor="middle"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="56"
          font-weight="900"
          letter-spacing="1"
          fill="#ffffff">CC0</text>

    <text x="205" y="78"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="31"
          font-weight="850"
          letter-spacing="2"
          fill="#ffffff">PUBLIC DOMAIN</text>

    <line x1="205" y1="96" x2="455" y2="96" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.72"/>

    <text x="205" y="130"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="23"
          font-weight="760"
          letter-spacing="1.5"
          fill="#d8f2ff">NON-BINDING REF</text>
  </g>
</svg>
